<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Benchmark Computers Terminal Tool</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #1755a6 0%, #2a3d5c 100%)
        }
        
        .container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            max-width: 600px;
        }
        
        .logo {
            margin-bottom: 30px;
        }
        
        .logo img {
            max-width: 340px;
            height: auto;
        }
        
        h1 {
            color: #333;
            margin: 20px 0;
        }
        
        .instructions {
            text-align: left;
            background: #f5f5f5;
            padding: 20px;
            border-radius: 4px;
            margin: 20px 0;
        }
        
        .instructions h2 {
            color: #667eea;
            font-size: 18px;
        }
        
        .instructions ol {
            color: #555;
            line-height: 1.8;
        }
        
        code {
            background: #333;
            color: #0f0;
            padding: 2px 6px;
            border-radius: 3px;
            font-family: 'Courier New', monospace;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <img src="https://benchmarkcomputersaz.com/wp-content/uploads/2025/01/Benchmark-logo-blue.png" alt="Benchmark Computers Logo">
        </div>

        <div class="instructions">
            <h2>Command Line Instructions</h2>
            <ol>
                <li>Open Terminal or PowerShell as Administrator</li>
                <li>Run the command: <code>iwr tools.bmcaz.link | iex</code></li>
                <li>If prompted, confirm the execution of the script</li>
                <li>Choose the appropriate option from the menu that appears</li>
            </ol>
        </div>
    </div>
</body>
</html>
